<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Профиль</title>
</head>
<body>
    <h1>Профиль</h1>
    
    <div style="margin: 20px 0;">
        <h2 id="displayName">Загрузка...</h2>
        <p>ID: <span id="displayId">—</span></p>
    </div>

    <div style="margin: 10px 0;">
        <label>Имя:</label><br>
        <input type="text" id="inputName" style="width:100%; padding:10px;">
    </div>

    <div style="margin: 10px 0;">
        <label>Телефон:</label><br>
        <input type="text" id="inputPhone" style="width:100%; padding:10px;">
    </div>

    <div style="margin: 10px 0;">
        <label>Адрес:</label><br>
        <input type="text" id="inputAddress" style="width:100%; padding:10px;">
    </div>

    <button onclick="saveAll()" style="padding:15px; width:100%;">💾 Сохранить все</button>
    <button onclick="clearAll()" style="padding:15px; width:100%; margin-top:10px;">🗑️ Очистить</button>

    <script>
        let userData = {
            name: '',
            phone: '',
            address: '',
            id: 'ABC' + Math.floor(Math.random() * 1000)
        };

        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            updateDisplay();
        });

        function loadData() {
            const saved = localStorage.getItem('simpleProfile');
            if (saved) {
                userData = JSON.parse(saved);
            }
            console.log('Загружено:', userData);
        }

        function saveData() {
            localStorage.setItem('simpleProfile', JSON.stringify(userData));
            console.log('Сохранено:', userData);
        }

        function updateDisplay() {
            document.getElementById('displayName').textContent = userData.name || 'Пользователь';
            document.getElementById('displayId').textContent = userData.id;
            
            document.getElementById('inputName').value = userData.name || '';
            document.getElementById('inputPhone').value = userData.phone || '';
            document.getElementById('inputAddress').value = userData.address || '';
        }

        function saveAll() {
            userData.name = document.getElementById('inputName').value;
            userData.phone = document.getElementById('inputPhone').value;
            userData.address = document.getElementById('inputAddress').value;
            
            saveData();
            updateDisplay();
            alert('✅ Сохранено!');
        }

        function clearAll() {
            if (confirm('Очистить данные?')) {
                localStorage.removeItem('simpleProfile');
                userData = {
                    name: '',
                    phone: '',
                    address: '',
                    id: 'ABC' + Math.floor(Math.random() * 1000)
                };
                updateDisplay();
                alert('Данные очищены');
            }
        }
    </script>
</body>
</html>
